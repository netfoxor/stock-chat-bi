# =============================================================================
# stock.incredily.com — 1Panel / Nginx 可直接使用的整站配置
# -----------------------------------------------------------------------------
# Docker：同一宿主机 docker compose ，前端映射为宿主 5173 → 容器 80（Compose 默认值）。
# 把下面两段 server { ... } 整体粘贴进站点配置文件（删掉同名的旧 server），然后 nginx -t && nginx -s reload
# =============================================================================

# --------- HTTP：证书校验 + 其余跳 HTTPS（避免与普通 location 混在一起）---------

server {
    listen 80;
    server_name stock.incredily.com;

    access_log /www/sites/stock.incredily.com/log/access.log main;
    error_log  /www/sites/stock.incredily.com/log/error.log;

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    location ^~ /.well-known/acme-challenge {
        allow all;
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --------- HTTPS：整站反向代理到 Docker 前端容器（宿主 5173）-------------------------

server {
    listen 443 ssl;
    http2 on;
    server_name stock.incredily.com;

    # 若流式聊天仍「整段结束时才一次性出现」，可临时注释上一行「http2 on;」，仅保留 listen 443 ssl;

    access_log /www/sites/stock.incredily.com/log/access.log main;
    error_log  /www/sites/stock.incredily.com/log/error.log;

    ssl_certificate     /www/sites/stock.incredily.com/ssl/fullchain.pem;
    ssl_certificate_key /www/sites/stock.incredily.com/ssl/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        client_max_body_size 20m;
    }
}
