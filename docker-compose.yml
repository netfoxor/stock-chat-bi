# 默认：**外置 MySQL**（1Panel / 宿主已装库）。数据库连接写在 `backend/.env` 的 `DATABASE_URL`。
# 仍需一键带 MySQL 容器时：`docker compose -f docker-compose-with-mysql.yml up`
#
# Docker 后端访问宿主上的 MySQL：`DATABASE_URL` 主机可用 host.docker.internal（下方 extra_hosts）。
# MySQL 需监听宿主机可被容器访问的地址（若仅监听 127.0.0.1，请调整 bind-address 或使用网络可达端口）。

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
    env_file:
      - ./backend/.env
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        NPM_REGISTRY: https://registry.npmmirror.com
    ports:
      - "5173:80"
    depends_on:
      - backend
