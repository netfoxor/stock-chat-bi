# 推送 master → SSH 到 ECS，在 DEPLOY_APP_DIR 下 git sync 后 docker compose 更新。
# Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_APP_DIR；认证二选一 —— DEPLOY_SSH_KEY 或 DEPLOY_PASSWORD
# 可选: DEPLOY_PORT, DEPLOY_COMPOSE_FILES；私钥带文件密码时加 DEPLOY_SSH_KEY_PASSPHRASE
#
# 若 Secrets 配在「Environment」里（非 Repository secrets），下方 job 的 environment 须与之一致，否则 host 等会为空 → missing server host。

name: Deploy to ECS

on:
  push:
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: deploy-ecs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_APP_DIR }}"

            git config --global --add safe.directory "$(pwd)" || true

            git fetch origin master
            git reset --hard origin/master

            CF='${{ secrets.DEPLOY_COMPOSE_FILES }}'
            if [ -z "$CF" ]; then
              docker compose build --parallel
              docker compose up -d --remove-orphans
            else
              # shellcheck disable=SC2086
              docker compose $CF build --parallel
              # shellcheck disable=SC2086
              docker compose $CF up -d --remove-orphans
            fi

            if [ -z "$CF" ]; then docker compose ps; else docker compose $CF ps; fi
